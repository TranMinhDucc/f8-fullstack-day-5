<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/style.css" />
        <title>Register</title>
    </head>
    <body>
        <div class="form-container">
            <form action="" autocomplete="off">
                <h1 class="center">Register</h1>
                <div class="form">
                    <label for="name" class="obligatory">Name</label> <br />
                    <input type="name" class="input" id="name" required/>
                </div>
                <div class="form">
                    <label for="email" class="obligatory">Email</label> <br />
                    <input type="email" class="input" id="email" required/>
                </div>
                <div class="form">
                    <label for="phone" class="obligatory">Phone Number</label> <br />
                    <input type="number" class="input" id="phone" required/>
                </div>
                <div class="form">
                    <label for="password" class="obligatory">Password</label> <br />
                    <input type="password" class="input" id="password" required/>
                </div>
                <div class="form">
                    <label for="confirm-password" class="obligatory">Confirm Password</label>
                    <br />
                    <input
                        type="password"
                        class="input"
                        id="confirm-password"
                        required
                    />
                </div>
                <fieldset class="form gender">
                    <label class="obligatory">Gender</label> <br />
                    <input type="radio" name="gender" value="Male" required/>
                    <label for="">Male</label>
                    <input type="radio" name="gender" value="Female" required/>
                    <label for="">Female</label>
                    <input type="radio" name="gender" value="Other" required/>
                    <label for="">Other</label>
                </fieldset>
                <div class="form">
                    <label for="date">Date of Birth</label> <br />
                    <input type="date" id="date" />
                </div>
                <div class="form address">
                    <label for="address" class="obligatory">Address</label> <br />
                    <textarea name="" id="address" required></textarea>
                </div>
                <div class="form">
                    <label for="avatar"
                        >Profile Picture (Avatar) <br />
                        <div class="image"></div>
                        <input
                            type="file"
                            class="avatar"
                            id="avatar"
                            accept="image/png, image/jpeg"
                    /></label>
                </div>
                <div class="form">
                    <label for="">Gender</label> <br />
                    <input type="checkbox" name="gender" value="Male" />
                    <label for=""
                        >Subscribe to Newsletter (Nhận bản tin định kỳ)
                    </label>
                    <br />
                    <input type="checkbox" name="gender" value="Female" />
                    <label for=""
                        >Receive Promotional Emails (Nhận thông tin khuyến mãi)
                    </label>
                    <br />
                    <input type="checkbox" name="gender" value="Other" />
                    <label for=""
                        >Get Product Updates (Nhận cập nhật sản phẩm mới)
                    </label>
                </div>
                <button type="submit">Send</button>
            </form>
        </div>
    </body>
</html>
